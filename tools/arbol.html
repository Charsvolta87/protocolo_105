<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../imagenes/logo.png">

<title>Árbol Narrativo - Protocolo 105</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

h1{
    text-align:center;
}

#tree{
    display:flex;
    flex-direction:column;
    gap:20px;
    margin-top:30px;
}

.node{
    background:#222;
    border:2px solid #555;
    border-radius:10px;
    padding:15px;
}

.node h3{
    margin-top:0;
    color:#7ec8ff;
}

.option{
    margin-left:20px;
    color:#ccc;
}

.target{
    color:#7fff7f;
}

.thumb{
    width:100%;
    max-height:180px;
    object-fit:cover;
    border-radius:8px;
    margin-bottom:10px;
    border:1px solid #444;
}

</style>
</head>

<body>

<h1>Árbol Narrativo</h1>

<div id="tree"></div>

<script src="../data/scenes.js"></script>

<script>

const tree = document.getElementById("tree");

for(const id in scenes){

    const scene = scenes[id];

    const div = document.createElement("div");

    div.className = "node";

    let html = `
    <h3>${scene.titulo}</h3>

        <small>
        ID: ${id}
        </small>

    <img
        src="../${scene.imagen}"
        class="thumb"
        alt="${id}"
    >

    <p>
        ${scene.texto.substring(0,100)}...
    </p>
`;

    if(scene.opciones.length > 0){

        html += "<strong>Opciones:</strong>";

        scene.opciones.forEach(opcion => {

            html += `
                <div class="option">
                    ➜ ${opcion.texto}
                    →
                    <span class="target">
                        ${opcion.siguiente}
                    </span>
                </div>
            `;

        });

    }else{

        html += `
            <div style="color:orange;">
                Sin opciones (posible final)
            </div>
        `;
    }

    div.innerHTML = html;

    tree.appendChild(div);
}

</script>

</body>
</html>
